name: PR Checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workspace-checks:
    name: Workspace checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Workspace scaffold test
        run: pnpm test

      - name: API behavior tests
        run: pnpm --filter @wordle-royale/api test

      - name: Build all packages and apps
        run: pnpm build

      - name: Local config smoke
        run: pnpm smoke:local

      # Config-only Docker Compose check. This validates the local dependency
      # contract without starting PostgreSQL/Redis or requiring deploy secrets.
      - name: Dependency config check
        run: pnpm deps:check

      - name: Secret scan
        run: pnpm secret-scan
